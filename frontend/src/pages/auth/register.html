<div class="register">
  <div class="container">
    <div class="row">
      <div class="col-md-8 m-auto">
        <h1 class="display-4 text-center mb-4">Register</h1>
        <form id="registration-form">
          <div class="form-group">
            <input 
              type="text" 
              class="form-control form-control-md"
              placeholder="Name"
              name="name"
              autocomplete="name"
            >
          </div>
          <br>

          <div class="form-group">
            <input 
              type="email" 
              class="form-control form-control-md"
              placeholder="Email"
              name="email"
              autocomplete="email"
            >
          </div>
          <br>

          <div class="form-group">
            <input 
              type="password" 
              class="form-control form-control-md"
              placeholder="Password"
              name="password"
              autocomplete="new-password"
            >
          </div>
          <br>

          <div class="form-group">
            <input 
              type="password" 
              class="form-control form-control-md"
              placeholder="Confirm Password"
              name="confirmPassword"
              autocomplete="new-password"
            >
          </div>
          <br>

          <input 
            type="submit"
            class="btn main-btn btn-block mt-4 w-100"          
          >
        </form>
      </div>
    </div>
  </div>
</div>
